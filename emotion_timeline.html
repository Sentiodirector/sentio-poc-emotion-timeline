<!DOCTYPE html>
<html>
<head>
    <title>Emotion Timeline</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .box {
            background: white;
            border: 1px solid #ccc;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
        }
        ul {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>Emotion Timeline Report</h1>

<p>Select your JSON file:</p>
<input type="file" onchange="loadFile(event)">

<div id="output"></div>

<script>
function loadFile(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const data = JSON.parse(e.target.result).emotion_timeline;

        let html = `
            <div class="box"><b>Suppression Score:</b> ${data.suppression_score}</div>
            <div class="box"><b>Emotional Range:</b> ${data.emotional_range}</div>
            <h3>Micro-Expressions</h3>
            <ul>
        `;

        data.micro_expressions.forEach(e => {
            html += `<li>
                Time: ${e.time.toFixed(2)} sec |
                Emotion: ${e.emotion} |
                Duration: ${e.duration.toFixed(2)} sec
            </li>`;
        });

        html += "</ul>";

        document.getElementById("output").innerHTML = html;
    };

    reader.readAsText(file);
}
</script>

</body>
</html>
